<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Audio Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            /* Monochromatic background gradient */
            background-color: #f5f5f5;
            background-image: radial-gradient(#d4d4d4 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark body {
            background-color: #121212;
            background-image: radial-gradient(#333 1px, transparent 1px);
        }
        
        /* Dropzone transitioning */
        .drop-zone {
            border: 2px dashed #a3a3a3; /* neutral-400 */
            transition: all 0.2s ease-in-out;
        }
        .dark .drop-zone {
            border-color: #525252; /* neutral-600 */
        }
        .drop-zone-over {
            border-color: #171717; /* neutral-900 */
            background-color: rgba(0, 0, 0, 0.05);
        }
        .dark .drop-zone-over {
            border-color: #f5f5f5; /* neutral-100 */
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Custom Select chevron */
        select.custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='16' height='16' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1rem;
        }
        .dark select.custom-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='16' height='16' fill='none' stroke='%23f5f5f5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="text-neutral-800 dark:text-neutral-200 antialiased min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6 z-50">
        <button id="themeToggle" class="p-2 rounded-full bg-white dark:bg-neutral-800 shadow-sm border border-neutral-200 dark:border-neutral-700 hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-black dark:focus-visible:ring-white" aria-label="Toggle Dark Mode">
            <i data-lucide="moon" id="themeIcon" class="w-5 h-5 text-neutral-800 dark:text-neutral-200"></i>
        </button>
    </div>

    <!-- Main Container (Glassmorphism) -->
    <div class="w-full max-w-4xl bg-white/90 dark:bg-neutral-900/90 backdrop-blur-xl rounded-2xl shadow-2xl border border-neutral-200 dark:border-neutral-800 p-8 space-y-8 transition-colors duration-200">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold tracking-tight text-neutral-900 dark:text-white">FFmpeg Audio Converter</h1>
            <p class="text-neutral-500 dark:text-neutral-400">High-performance local audio processing.</p>
        </div>

        <!-- Drop Zone -->
        <div id="dropZone" class="drop-zone rounded-xl p-12 text-center cursor-pointer relative overflow-hidden group">
            <div id="dropZoneText" class="flex flex-col items-center justify-center space-y-3 relative z-10 transition-transform duration-200 group-hover:scale-105">
                <i data-lucide="upload-cloud" class="w-12 h-12 text-neutral-400 dark:text-neutral-500"></i>
                <p class="text-xl font-semibold text-neutral-700 dark:text-neutral-300">Drag & Drop Audio File Here</p>
                <p class="text-sm font-medium text-neutral-500 dark:text-neutral-400">or click to browse local files</p>
                <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="audio/*,video/*">
            </div>
            
            <div id="fileInfo" class="hidden flex flex-col items-center justify-center space-y-3">
                <i data-lucide="file-audio" class="w-12 h-12 text-neutral-800 dark:text-white"></i>
                <div class="text-center w-full">
                    <p class="text-sm text-neutral-500 dark:text-neutral-400 font-medium">Selected File</p>
                    <p id="fileName" class="text-lg font-bold text-neutral-900 dark:text-white truncate mx-auto max-w-xs md:max-w-md"></p>
                </div>
            </div>
        </div>

        <!-- Audio Settings -->
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Format Selection -->
            <div class="space-y-1.5">
                <label for="format" class="block text-sm font-bold text-neutral-700 dark:text-neutral-300">Target Format</label>
                <select id="format" class="custom-select block w-full rounded-lg border border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 shadow-sm focus:border-black dark:focus:border-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-shadow py-2.5 pl-3 pr-10 outline-none">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                    <option value="aac">AAC</option>
                    <option value="flac">FLAC</option>
                    <option value="ogg">OGG</option>
                    <option value="m4a">M4A</option>
                </select>
            </div>

            <!-- Audio Bitrate -->
            <div class="space-y-1.5">
                <label for="bitrate" class="block text-sm font-bold text-neutral-700 dark:text-neutral-300">Audio Bitrate (kbps)</label>
                <select id="bitrate" class="custom-select block w-full rounded-lg border border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 shadow-sm focus:border-black dark:focus:border-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-shadow py-2.5 pl-3 pr-10 outline-none">
                    <option value="32">32 kbps</option>
                    <option value="64">64 kbps</option>
                    <option value="96">96 kbps</option>
                    <option value="128" selected>128 kbps (Standard)</option>
                    <option value="160">160 kbps</option>
                    <option value="192">192 kbps (High Quality)</option>
                    <option value="256">256 kbps</option>
                    <option value="320">320 kbps (Max Quality)</option>
                </select>
            </div>

             <!-- Audio Channels -->
            <div class="space-y-1.5">
                <label for="channels" class="block text-sm font-bold text-neutral-700 dark:text-neutral-300">Audio Channels</label>
                <select id="channels" class="custom-select block w-full rounded-lg border border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 shadow-sm focus:border-black dark:focus:border-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-shadow py-2.5 pl-3 pr-10 outline-none">
                    <option value="1">Mono (1 Channel)</option>
                    <option value="2" selected>Stereo (2 Channels)</option>
                </select>
            </div>

            <!-- Sample Rate -->
            <div class="space-y-1.5">
                <label for="sampleRate" class="block text-sm font-bold text-neutral-700 dark:text-neutral-300">Sample Rate (Hz)</label>
                <select id="sampleRate" class="custom-select block w-full rounded-lg border border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 shadow-sm focus:border-black dark:focus:border-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-shadow py-2.5 pl-3 pr-10 outline-none">
                    <option value="8000">8000 Hz</option>
                    <option value="11025">11025 Hz</option>
                    <option value="16000">16000 Hz</option>
                    <option value="22050">22050 Hz</option>
                    <option value="32000">32000 Hz</option>
                    <option value="44100" selected>44100 Hz (CD)</option>
                    <option value="48000">48000 Hz (DVD)</option>
                    <option value="96000">96000 Hz (Studio)</option>
                </select>
            </div>
        </div>

        <!-- Action Button -->
        <div class="pt-4 flex justify-center">
            <button id="convertBtn" class="flex items-center justify-center space-x-2 w-full md:w-2/3 bg-black dark:bg-white text-white dark:text-black font-bold text-lg py-4 px-8 rounded-xl shadow-lg hover:bg-neutral-800 dark:hover:bg-neutral-200 transition-colors focus:outline-none focus:ring-4 focus:ring-neutral-400 dark:focus:ring-neutral-600 disabled:bg-neutral-300 dark:disabled:bg-neutral-700 disabled:text-neutral-500 disabled:cursor-not-allowed" disabled>
                <i data-lucide="zap" class="w-5 h-5 flex-shrink-0"></i>
                <span id="convertBtnText">Convert Audio</span>
            </button>
        </div>

        <!-- Progress and Log -->
        <div id="progressSection" class="hidden space-y-6 pt-6 border-t border-neutral-200 dark:border-neutral-800">
            
            <!-- Status Message -->
            <div id="statusMessage" class="hidden font-medium"></div>
            
            <!-- Progress Bar -->
            <div id="progressBarContainer" class="hidden space-y-2">
                <div class="flex justify-between text-sm font-bold text-neutral-700 dark:text-neutral-300">
                    <span>Processing</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full h-3 bg-neutral-200 dark:bg-neutral-800 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-black dark:bg-white transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <!-- Generated Command -->
            <div class="space-y-2">
                <p class="text-xs font-bold text-neutral-500 uppercase tracking-wider">Generated FFmpeg Command</p>
                <div class="bg-neutral-900 border border-neutral-800 shadow-inner text-neutral-300 font-mono p-4 rounded-xl text-sm overflow-x-auto">
                    <code id="ffmpegCommand" class="whitespace-nowrap"></code>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- Initialize Icons ---
        lucide.createIcons();

        // --- Theme Toggling ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;
        
        // Check local storage or fallback to system preference
        const hasDarkPreference = localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
        if (hasDarkPreference) {
            htmlElement.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // Swap icon
            themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });

        // --- DOM Elements ---
        const dropZone = document.getElementById('dropZone');
        const dropZoneText = document.getElementById('dropZoneText');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameEl = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const convertBtnText = document.getElementById('convertBtnText');
        const bitrateSelect = document.getElementById('bitrate');
        const formatSelect = document.getElementById('format');
        const channelsSelect = document.getElementById('channels');
        const sampleRateSelect = document.getElementById('sampleRate');
        const progressSection = document.getElementById('progressSection');
        const ffmpegCommand = document.getElementById('ffmpegCommand');
        const statusMessage = document.getElementById('statusMessage');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let selectedFile = null;
        const SERVER_URL = 'http://127.0.0.1:5000/convert';

        // --- Event Listeners ---
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone-over'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('drop-zone-over'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone-over');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
        convertBtn.addEventListener('click', () => { if (selectedFile) uploadToServerWithProgress(); });

        // --- Core Functions ---
        function handleFile(file) {
            selectedFile = file;
            fileNameEl.textContent = file.name;
            dropZoneText.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            convertBtn.disabled = false;
            progressSection.classList.add('hidden');
            statusMessage.classList.add('hidden');
        }

        function generateCommand(inputFilename) {
            const outputFilename = `${inputFilename.split('.').slice(0, -1).join('.')}.${formatSelect.value}`;
            return `ffmpeg -i "${inputFilename}" -vn -ac ${channelsSelect.value} -ar ${sampleRateSelect.value} -b:a ${bitrateSelect.value}k "${outputFilename}"`;
        }
        
        function setStatus(message, isError = false) {
            statusMessage.innerHTML = '';
            
            const icon = document.createElement('i');
            icon.setAttribute('data-lucide', isError ? 'alert-circle' : 'check-circle');
            icon.className = 'w-5 h-5 flex-shrink-0';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = message;

            statusMessage.appendChild(icon);
            statusMessage.appendChild(textSpan);

            statusMessage.className = `flex items-center space-x-3 p-4 rounded-lg font-bold border ${
                isError 
                ? 'bg-neutral-100 dark:bg-neutral-900 border-neutral-300 dark:border-neutral-700 text-neutral-800 dark:text-neutral-200' 
                : 'bg-black dark:bg-white border-black dark:border-white text-white dark:text-black'
            }`;
            statusMessage.classList.remove('hidden');
            
            // Re-initialize Lucide for the newly created icon
            lucide.createIcons();
        }

        function updateProgressBar(percent) {
            progressBar.style.width = `${percent}%`;
            progressText.textContent = `${percent}%`;
        }

        function uploadToServerWithProgress() {
            // 1. Prepare UI for conversion
            convertBtn.disabled = true;
            convertBtnText.textContent = 'Processing...';
            progressSection.classList.remove('hidden');
            progressBarContainer.classList.remove('hidden');
            updateProgressBar(0);
            statusMessage.classList.add('hidden');
            ffmpegCommand.textContent = generateCommand(selectedFile.name);

            // 2. Create FormData and XMLHttpRequest
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('format', formatSelect.value);
            formData.append('bitrate', bitrateSelect.value);
            formData.append('channels', channelsSelect.value);
            formData.append('sampleRate', sampleRateSelect.value);

            const xhr = new XMLHttpRequest();

            // 3. Listen for upload progress events
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    updateProgressBar(percentComplete);
                }
            });

            // 4. Handle completion of the request
            xhr.onload = () => {
                updateProgressBar(100);
                convertBtnText.textContent = 'Finalizing...';
                
                if (xhr.status === 200) {
                    // Success - server sent back the file
                    const blob = xhr.response;
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = downloadUrl;
                    const outputFilename = `${selectedFile.name.split('.').slice(0, -1).join('.')}.${formatSelect.value}`;
                    a.download = outputFilename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(downloadUrl);
                    document.body.removeChild(a);
                    setStatus('Conversion complete. Download initiated.', false);
                } else {
                    // Server returned an error
                    try {
                        // The response might be parsed if we didn't use responseType='blob'
                        // but since we did, reading the blob text is needed for errors
                        const reader = new FileReader();
                        reader.onload = function() {
                            try {
                                const errorData = JSON.parse(reader.result);
                                setStatus(`Failed: ${errorData.details || errorData.error}`, true);
                            } catch(e) {
                                setStatus(`Failed with status: ${xhr.status}`, true);
                            }
                        };
                        reader.readAsText(xhr.response);
                    } catch (e) {
                        setStatus(`Error: Unexpected server response.`, true);
                    }
                }
                
                // Reset button after operation
                convertBtn.disabled = false;
                convertBtnText.textContent = 'Convert Audio';
            };
            
            // 5. Handle network errors
            xhr.onerror = () => {
                console.error('Network Error:', xhr.statusText);
                setStatus('Network Error: Server unreachable or offline.', true);
                convertBtn.disabled = false;
                convertBtnText.textContent = 'Convert Audio';
            };

            // 6. Configure and send the request
            xhr.open('POST', SERVER_URL, true);
            xhr.responseType = 'blob'; // We expect a file back
            xhr.send(formData);
        }
    </script>
</body>
</html>
